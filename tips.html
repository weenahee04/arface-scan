<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ARFACE — บทความฟิลเลอร์</title>
<meta name="theme-color" content="#EAF5FD">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob: data:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="stylesheet" href="assets/fonts.css">
<link rel="stylesheet" href="assets/arface.css">
<style>
  .screen { background: linear-gradient(180deg, #EAF6FF 0%, #F5FBFF 34%, #FFFFFF 72%); }
  .head { position: relative; z-index: 10; margin: 14px 24px 0; }
  .head h1 { font-size: 24px; font-weight: 800; color: #122036; letter-spacing: -.3px; }
  .head p { font-size: 12.5px; color: var(--text-2); margin-top: 3px; }

  /* featured article */
  .feat { position: relative; z-index: 5; margin: 16px 18px 0; }
  .feat-card {
    display: block; position: relative; padding: 18px; border-radius: 20px; overflow: hidden;
    color: #fff; text-decoration: none;
    background-color: #2D9FEE; background-size: cover; background-position: center;
    box-shadow: 0 14px 30px rgba(45,159,238,.32);
  }
  .feat-card::after { content: ""; position: absolute; right: -40px; top: -50px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,.25), rgba(255,255,255,0) 65%); }
  .feat-card .k { position: relative; display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; opacity: .96; }
  .feat-card h2 { position: relative; font-size: 19px; font-weight: 800; margin-top: 8px; line-height: 1.32; }
  .feat-card p { position: relative; font-size: 12.5px; line-height: 1.6; margin-top: 6px; opacity: .96; }
  .feat-card .more { position: relative; display: inline-block; margin-top: 12px; font-size: 12.5px; font-weight: 700; }

  .sect { position: relative; z-index: 5; margin: 22px 24px 12px; font-size: 17px; font-weight: 700; color: #16273C; }
  .feed { position: relative; z-index: 5; margin: 0 18px; display: flex; flex-direction: column; gap: 12px; }
  .tip {
    display: flex; gap: 14px; align-items: flex-start; text-decoration: none; color: inherit;
    background: #fff; border-radius: 18px; box-shadow: var(--sh-card); padding: 15px 16px;
    transition: transform .16s var(--ease);
  }
  .tip:active { transform: scale(.99); }
  .tip .ic { flex: none; width: 46px; height: 46px; border-radius: 14px; background: var(--grad-tile); display: flex; align-items: center; justify-content: center; }
  .tip .thumb { flex: none; width: 76px; height: 76px; border-radius: 14px; background: #E7F5FF center / cover no-repeat; }
  .tip .b { min-width: 0; flex: 1; }
  .tip .tag { display: inline-flex; height: 19px; padding: 0 9px; border-radius: 999px; background: var(--border); color: var(--blue); font-size: 10px; font-weight: 600; margin-bottom: 6px; }
  .tip h3 { font-size: 15px; font-weight: 700; color: #16273C; line-height: 1.35; }
  .tip p { font-size: 12.5px; color: var(--text-2); line-height: 1.55; margin-top: 4px; }
  .tip .rd { display: inline-block; margin-top: 8px; font-size: 10.5px; font-weight: 600; color: var(--muted); }

  .disc { position: relative; z-index: 5; margin: 18px 24px 0; font-size: 10.5px; color: var(--muted); line-height: 1.55; }
  .cta-wrap { position: relative; z-index: 5; margin: 18px 18px 0; }
</style>
</head>
<body>
<div class="screen">
  <div data-ar="statusbar"></div>

  <header class="head">
    <h1>บทความฟิลเลอร์</h1>
    <p>ความรู้ ข้อมูล และข่าวสารเรื่องฟิลเลอร์ — อ่านก่อนตัดสินใจ</p>
  </header>

  <main>
    <section class="feat" id="feat"></section>

    <div class="sect">บทความทั้งหมด</div>
    <section class="feed" id="feed"></section>

    <p class="disc">บทความเพื่อความเข้าใจเบื้องต้น ไม่ใช่คำแนะนำหรือการวินิจฉัยทางการแพทย์ ควรปรึกษาแพทย์ผู้เชี่ยวชาญก่อนตัดสินใจทำหัตถการ</p>

    <div class="cta-wrap">
      <a class="cta" href="scan.html">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2"/><path d="M12 8.2l1 2.6 2.6 1-2.6 1-1 2.6-1-2.6-2.6-1 2.6-1 1-2.6Z" fill="#fff" stroke="none"/></svg>
        เริ่มสแกนใบหน้า
      </a>
    </div>
  </main>

  <nav data-ar="tabbar" data-active="tips"></nav>
</div>

<script src="assets/ui.js"></script>
<script src="assets/articles.js"></script>
<script src="assets/tips.js"></script>
<script src="assets/sw-register.js"></script>
<script src="assets/fit.js"></script>
</body>
</html>
