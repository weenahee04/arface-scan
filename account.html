<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ARFACE — บัญชีคลินิก</title>
<meta name="theme-color" content="#EAF5FD">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://152.42.201.207.nip.io http://localhost:4000 https://localhost:4000; object-src 'none'; base-uri 'self'; form-action 'self'">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="stylesheet" href="assets/fonts.css">
<link rel="stylesheet" href="assets/arface.css">
<style>
  .screen { background: linear-gradient(180deg, #EAF6FF 0%, #F6FBFF 40%, #FFFFFF 78%); }
  .card { position: relative; z-index: 5; margin: 14px 18px 0; background: #fff; border-radius: 18px; box-shadow: var(--sh-card); padding: 16px; }
  .sect { position: relative; z-index: 5; margin: 22px 24px 10px; font-size: 16px; font-weight: 700; color: #16273C; }

  .org { display: flex; align-items: center; gap: 12px; }
  .org .av { width: 48px; height: 48px; border-radius: 14px; flex: none; background: var(--grad-cta); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 19px; }
  .org .oi b { font-size: 16.5px; font-weight: 700; color: var(--navy); }
  .org .oi .pl { margin-top: 3px; display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; }
  .org .oi .pl .badge { background: rgba(53,199,89,.13); color: var(--success); font-weight: 700; padding: 2px 9px; border-radius: 999px; font-size: 10.5px; }

  .ubar { height: 12px; border-radius: 999px; background: #EAF1F8; overflow: hidden; margin: 12px 0 8px; }
  .ubar i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #7ED0FA, #1E9FE9); transition: width .4s var(--ease); }
  .ubar i.warn { background: linear-gradient(90deg, #F5C06B, #DF9117); }
  .ubar i.full { background: linear-gradient(90deg, #F0876B, #E24B4A); }
  .urow { display: flex; justify-content: space-between; align-items: baseline; }
  .urow .big { font-family: var(--en); font-size: 22px; font-weight: 800; color: var(--navy); }
  .urow .big small { font-size: 13px; color: var(--muted); font-weight: 600; }
  .urow .rem { font-size: 12px; color: var(--text-2); }
  .uperiod { font-size: 11px; color: var(--muted); margin-top: 8px; }

  .plan { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 16px; box-shadow: var(--sh-card); padding: 14px; margin: 0 18px 10px; position: relative; z-index: 5; border: 1.5px solid transparent; }
  .plan.cur { border-color: #9FD8F7; }
  .plan .pm { flex: 1; min-width: 0; }
  .plan .pn { font-size: 15px; font-weight: 700; color: #16273C; }
  .plan .pd { font-size: 11.5px; color: var(--text-2); margin-top: 3px; }
  .plan .pp { text-align: right; flex: none; }
  .plan .pp .amt { font-family: var(--en); font-size: 16px; font-weight: 800; color: var(--blue); }
  .plan .pp .per { font-size: 10px; color: var(--muted); }
  .plan .pbtn { margin-top: 8px; height: 32px; padding: 0 14px; border: 0; border-radius: 999px; background: var(--grad-cta); color: #fff; font-family: var(--th); font-size: 11.5px; font-weight: 700; cursor: pointer; }
  .plan .pcur { font-size: 11px; font-weight: 700; color: var(--success); }

  .stafrow { display: flex; gap: 8px; margin-top: 10px; }
  .stafrow input { flex: 1; height: 40px; border: 1px solid var(--border); border-radius: 11px; background: #F8FBFE; padding: 0 12px; font-family: var(--th); font-size: 12.5px; outline: none; min-width: 0; }
  .stafrow button { flex: none; height: 40px; padding: 0 14px; border: 0; border-radius: 11px; background: var(--blue); color: #fff; font-family: var(--th); font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .smsg { font-size: 11px; margin-top: 8px; color: var(--success); }

  .logout { display: block; text-align: center; margin: 22px auto 8px; font-size: 13px; font-weight: 600; color: #D8503C; background: none; border: 0; cursor: pointer; }
  .loading { text-align: center; color: var(--muted); font-size: 13px; padding: 40px 0; }
  .note { margin: 14px 18px 0; }
</style>
</head>
<body>
<div class="screen">
  <div data-ar="statusbar"></div>
  <header data-ar="topbar" data-title="บัญชีคลินิก" data-back="index.html"></header>

  <main>
    <div id="content"><div class="loading">กำลังโหลด…</div></div>
  </main>
</div>

<script src="assets/ui.js"></script>
<script src="assets/api.js"></script>
<script src="assets/account.js"></script>
<script src="assets/fit.js"></script>
</body>
</html>
