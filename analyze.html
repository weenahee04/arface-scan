<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ARFACE — วิเคราะห์ใบหน้า</title>
<meta name="theme-color" content="#EAF5FD">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob: data:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="stylesheet" href="assets/fonts.css">
<link rel="stylesheet" href="assets/arface.css">
<style>
  .screen { background: linear-gradient(180deg, #EAF6FF 0%, #F5FBFF 32%, #FFFFFF 72%); }
  .topbar .ttl { text-align: left; font-size: 18px; }
  .sub2 { position: relative; z-index: 5; margin: 8px 22px 0; font-size: 11.5px; color: var(--text-2); }
  .sec { position: relative; z-index: 5; margin: 22px 18px 0; }
  .sec-t { font-size: 18px; font-weight: 700; color: #16273C; }
  .sec-s { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .card-p { background: #fff; border-radius: 18px; box-shadow: var(--sh-card); }

  /* golden-grid hero */
  .grid-wrap { position: relative; margin-top: 12px; border-radius: 18px; overflow: hidden; box-shadow: var(--sh-card); background: #EAF4FC; }
  .grid-wrap canvas { display: block; width: 100%; height: auto; }
  .grid-badge { position: absolute; left: 12px; bottom: 12px; display: inline-flex; align-items: center; gap: 7px; height: 30px; padding: 0 13px; border-radius: 999px; background: rgba(22,39,60,.62); backdrop-filter: blur(4px); color: #fff; font-size: 12px; font-weight: 600; }
  .grid-badge b { font-family: var(--en); color: #9FE0FF; }

  /* symmetry mirror */
  .mirror { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; margin-top: 12px; }
  .mcell { background: #fff; border-radius: 14px; box-shadow: var(--sh-card); padding: 8px; text-align: center; }
  .mcell canvas { display: block; width: 100%; height: auto; border-radius: 9px; background: #EAF4FC; }
  .mcell .cap { font-size: 11px; color: var(--text-2); margin-top: 6px; }
  .mcell.now .cap { color: var(--blue); font-weight: 600; }
  .symline { margin-top: 12px; display: flex; align-items: center; gap: 10px; background: #fff; border-radius: 14px; box-shadow: var(--sh-card); padding: 12px 14px; }
  .symline .v { font-family: var(--en); font-size: 24px; font-weight: 800; color: var(--success); }
  .symline .tx { font-size: 11.5px; color: var(--text-2); line-height: 1.4; }

  /* face shape */
  .shape { display: flex; gap: 14px; align-items: center; padding: 16px; margin-top: 12px; }
  .shape .pic { width: 88px; height: 99px; flex: none; border-radius: 14px; overflow: hidden; background: #EAF4FC; }
  .shape .pic img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .shape .meta { flex: 1; min-width: 0; }
  .shape .badge2 { display: inline-flex; align-items: center; gap: 7px; height: 30px; padding: 0 14px; border-radius: 999px; background: var(--grad-cta); color: #fff; font-size: 15px; font-weight: 700; box-shadow: 0 4px 12px rgba(45,159,238,.3); }
  .shape .tip { font-size: 12px; color: #44566B; line-height: 1.55; margin-top: 9px; }
  .ratios { display: flex; gap: 8px; margin-top: 11px; }
  .ratios .rc { flex: 1; background: #F4FAFE; border-radius: 11px; padding: 8px 6px; text-align: center; }
  .ratios .rc .rv { font-family: var(--en); font-size: 14px; font-weight: 700; color: #16273C; }
  .ratios .rc .rl { font-size: 9.5px; color: var(--muted); margin-top: 2px; }

  .cta-wrap { position: relative; z-index: 6; margin: 20px 18px 0; }
  .ghost { margin-top: 10px; }
  .note { margin: 12px 18px 0; }

  .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(16px); background: rgba(22,39,60,.94); color: #fff; font-size: 12.5px; line-height: 1.45; text-align: center; padding: 11px 20px; border-radius: 999px; max-width: 320px; opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 60; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (prefers-reduced-motion: reduce) { .toast { transition: none; } }
</style>
</head>
<body>
<div class="screen">
  <div data-ar="statusbar" class="statusbar" aria-hidden="true">
    <span class="time">9:41</span>
    <span style="display:flex; align-items:center; gap:6px;">
      <svg width="18" height="11" viewBox="0 0 19 12" fill="#0B1B2B"><rect x="0" y="7.5" width="3.4" height="4.5" rx="1"/><rect x="5" y="5" width="3.4" height="7" rx="1"/><rect x="10" y="2.5" width="3.4" height="9.5" rx="1"/><rect x="15" y="0" width="3.4" height="12" rx="1"/></svg>
      <svg width="16" height="11" viewBox="0 0 17 12" fill="none" stroke="#0B1B2B" stroke-width="1.9" stroke-linecap="round"><path d="M1.5 4.2a10.4 10.4 0 0 1 14 0"/><path d="M4.1 7a6.7 6.7 0 0 1 8.8 0"/><path d="M6.8 9.7a3 3 0 0 1 3.4 0"/><circle cx="8.5" cy="10.8" r="1" fill="#0B1B2B" stroke="none"/></svg>
      <svg width="25" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.7" y="0.7" width="21" height="10.6" rx="3" stroke="#0B1B2B" stroke-opacity=".4" stroke-width="1"/><rect x="2.4" y="2.4" width="17.6" height="7.2" rx="1.8" fill="#0B1B2B"/><path d="M23.6 4v4a2.2 2.2 0 0 0 0-4Z" fill="#0B1B2B" fill-opacity=".4"/></svg>
    </span>
  </div>

  <header class="topbar">
    <a class="circbtn" href="result.html" aria-label="ย้อนกลับ">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="grow"><div class="ttl">วิเคราะห์ใบหน้า</div></div>
    <button class="circbtn" id="btn-share" aria-label="แชร์ผลวิเคราะห์">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1E9FE9" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M16 6l-4-4-4 4M12 2v14"/></svg>
    </button>
  </header>
  <p class="sub2">วิเคราะห์โครงสร้างใบหน้าจากการสแกนของคุณ — ประมวลผลบนเครื่อง</p>

  <main id="app"></main>
</div>
<div class="toast" id="toast" role="status"></div>

<script type="module" src="assets/analyze.js"></script>
<script src="assets/sw-register.js"></script>
<script src="assets/fit.js"></script>
</body>
</html>
